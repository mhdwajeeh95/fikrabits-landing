<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FikraBits — turning ideas into bits. Our website is under construction. Get in touch." />
  <meta name="theme-color" content="#1c1019" />
  <title>FikraBits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Decorative animated "bits" background -->
  <div class="bits-field" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand" aria-label="FikraBits">
      <span class="brand-light">Fikra</span><span class="brand-accent">Bits</span>
    </div>
    <button id="langToggle" class="lang-btn" type="button" aria-label="Switch language">
      <span class="lang-current">العربية</span>
    </button>
  </header>

  <main class="hero">
    <div class="hero-inner">
      <span class="badge" data-i18n="badge">Under construction</span>
      <h1 class="headline" data-i18n="headline">We're building something great.</h1>
      <p class="subhead" data-i18n="subhead">
        FikraBits turns ideas into bits. Our new site is on its way — in the
        meantime, drop us a line and let's talk.
      </p>

      <form id="contactForm" class="contact-card" novalidate>
        <h2 class="form-title" data-i18n="formTitle">Get in touch</h2>

        <div class="field">
          <label for="name" data-i18n="labelName">Name</label>
          <input type="text" id="name" name="name" autocomplete="name" required
                 data-i18n-attr="placeholder" data-i18n="phName" placeholder="Your name" />
        </div>

        <div class="field">
          <label for="email" data-i18n="labelEmail">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required
                 data-i18n-attr="placeholder" data-i18n="phEmail" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="message" data-i18n="labelMessage">Message</label>
          <textarea id="message" name="message" rows="4" required
                    data-i18n-attr="placeholder" data-i18n="phMessage"
                    placeholder="Tell us about your idea…"></textarea>
        </div>

        <button type="submit" class="cta" data-i18n="cta">Send message</button>
        <p id="formNote" class="form-note" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>
      <span data-i18n="copyright">© 2026 FikraBits. All rights reserved.</span>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
